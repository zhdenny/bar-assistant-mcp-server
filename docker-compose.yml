services:
  bar-assistant-mcp-server:
    image: zhdenny/bar-assistant-mcp-server:latest
    container_name: bar-assistant-mcp-server
    command: node dist/bar-assistant-mcp-server.js --sse
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - ./.env
    volumes:
      # Mount the targeted .gemini configuration directory for agy access
      - /root/.gemini:/root/.gemini
    labels:
      net.unraid.docker.icon: "/mnt/user/appdata/bar-assistant/icon.png"
    # Optionally, you can add a healthcheck
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 20s
